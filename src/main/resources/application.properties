spring.application.name=vehicle-fuel-management
# K?t n?i database
spring.datasource.url=jdbc:mysql://localhost:3306/vehicle_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sapassword
# Driver (th??ng t? nh?n, nh?ng thêm cho ch?c)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ? KHÔNG dùng cái này n?a (Hibernate 6 l?i)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
# ? N?u mu?n khai báo th́ dùng cái này
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080
minio.url=http://localhost:9000
minio.access-key=admin
minio.secret-key=12345678
minio.bucket.name=vehicle-images
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
